<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MR. EXECUTIVE 💸</title>

<style>

:root{
--bg:#020202;
--card:#0b0b0b;
--green:#18c964;
--text:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
padding-bottom:90px;
}

header{
text-align:center;
padding:25px;
}

.logo{
font-size:32px;
font-weight:bold;
}

.subtitle{
opacity:.7;
margin-top:5px;
}

.dashboard{
padding:15px;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
background:var(--card);
padding:18px;
border-radius:18px;
border:1px solid rgba(255,255,255,.05);
}

.card h3{
font-size:12px;
opacity:.7;
margin-bottom:8px;
}

.value{
font-size:24px;
font-weight:bold;
}

.green{
color:var(--green);
}

section{
padding:15px;
}

button{
background:var(--green);
border:none;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

input,
select,
textarea{
width:100%;
margin-top:10px;
padding:12px;
background:#111;
color:white;
border:none;
border-radius:10px;
}

.trade{
background:#0b0b0b;
padding:12px;
margin-top:10px;
border-radius:12px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#080808;
display:flex;
justify-content:space-around;
padding:15px;
border-top:1px solid rgba(255,255,255,.05);
}

.nav{
color:white;
cursor:pointer;
}

.active{
color:var(--green);
}

.hidden{
display:none;
}

</style>
</head>

<body>

<header>
<div class="logo">MR. EXECUTIVE 💸</div>
<div class="subtitle">Data Over Emotions</div>
</header>

<div id="dashboard">

<div class="dashboard">

<div class="card">
<h3>NET PROFIT</h3>
<div class="value green" id="profit">$0</div>
</div>

<div class="card">
<h3>WIN RATE</h3>
<div class="value" id="winrate">0%</div>
</div>

<div class="card">
<h3>TOTAL TRADES</h3>
<div class="value" id="trades">0</div>
</div>

<div class="card">
<h3>BEST STRATEGY</h3>
<div class="value" id="best">-</div>
</div>

</div>

</div>

<div id="journal" class="hidden">

<section>

<h2>Add Trade</h2>

<input id="pair" placeholder="Pair (XAUUSD)">
<input id="strategy" placeholder="Strategy">

<select id="session">
<option>London</option>
<option>New York</option>
<option>Asia</option>
</select>

<select id="direction">
<option>Buy</option>
<option>Sell</option>
</select>

<input id="entry" placeholder="Entry">
<input id="rr" placeholder="RR">

<input id="pl" placeholder="Profit/Loss $">

<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="addTrade()">
Save Trade
</button>

<div id="history"></div>

</section>

</div>

<div class="bottom-nav">

<div class="nav active" onclick="showPage('dashboard',this)">
🏠
</div>

<div class="nav" onclick="showPage('journal',this)">
📖
</div>

</div>

<script>

let trades=
JSON.parse(localStorage.getItem("trades")||"[]");

function save(){
localStorage.setItem(
"trades",
JSON.stringify(trades)
);
}

function addTrade(){

let trade={
pair:pair.value,
strategy:strategy.value,
session:session.value,
direction:direction.value,
entry:entry.value,
rr:rr.value,
pl:Number(pl.value),
notes:notes.value
};

trades.push(trade);

save();

pair.value="";
strategy.value="";
entry.value="";
rr.value="";
pl.value="";
notes.value="";

render();
}

function render(){

let total=0;
let wins=0;

let html="";

let strategyStats={};

trades.forEach(t=>{

total+=t.pl;

if(t.pl>0) wins++;

html+=`
<div class="trade">
<b>${t.pair}</b><br>
${t.strategy}<br>
$${t.pl}
</div>
`;

if(!strategyStats[t.strategy]){
strategyStats[t.strategy]={
wins:0,
total:0
};
}

strategyStats[t.strategy].total++;

if(t.pl>0){
strategyStats[t.strategy].wins++;
}

});

history.innerHTML=html;

profit.innerText=
"$"+total.toFixed(2);

tradesEl=
trades.length;

document.getElementById(
"trades"
).innerText=tradesEl;

let wr=
trades.length
?
((wins/trades.length)*100).toFixed(1)
:0;

winrate.innerText=
wr+"%";

let bestStrategy="-";
let bestRate=0;

for(let s in strategyStats){

let r=
(strategyStats[s].wins/
strategyStats[s].total)*100;

if(r>bestRate){
bestRate=r;
bestStrategy=s;
}

}

best.innerText=
bestStrategy;

}

function showPage(page,el){

dashboard.classList.add("hidden");
journal.classList.add("hidden");

document.getElementById(page)
.classList.remove("hidden");

document
.querySelectorAll(".nav")
.forEach(n=>n.classList.remove("active"));

el.classList.add("active");

}

render();

</script>

</body>
</html>
